version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: korapay-db
    restart: always
    environment:
      - POSTGRES_DB=cbpa_db
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres_password_kora_2026
    ports:
      - "5432:5432"
    volumes:
      - korapay-db-data:/var/lib/postgresql/data
    networks:
      - korapay-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: korapay-backend
    restart: always
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
      - NODE_ENV=development
      - DATABASE_URL=postgresql://postgres:postgres_password_kora_2026@db:5432/cbpa_db
      - JWT_SECRET=your_super_secret_jwt_key_here
      - JWT_EXPIRES_IN=7d
      - STELLAR_NETWORK=testnet
      - STELLAR_HORIZON_URL=https://horizon-testnet.stellar.org
      - ENCRYPTION_KEY=your_32_character_encryption_key_
      - BALANCE_CACHE_TTL_SECONDS=30
      - ADMIN_PUBLIC_KEY=GBADMIN12345678901234567890123456789012345678901234567890
      - SEP10_SERVER_KEY=SDSERVERSECRETKEYEXAMPLE123456789012345678901234567890
    depends_on:
      - db
    networks:
      - korapay-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: korapay-frontend
    restart: always
    ports:
      - "3000:3000"
    environment:
      - VITE_BACKEND_URL=http://backend:5000
    depends_on:
      - backend
    networks:
      - korapay-network

volumes:
  korapay-db-data:
    name: korapay-db-data

networks:
  korapay-network:
    name: korapay-network
    driver: bridge
