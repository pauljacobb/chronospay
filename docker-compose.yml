version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: chronospay-db
    restart: always
    environment:
      - POSTGRES_DB=chronospay_db
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres_password_chronos_2026
    ports:
      - "5432:5432"
    volumes:
      - chronospay-db-data:/var/lib/postgresql/data
    networks:
      - chronospay-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: chronospay-backend
    restart: always
    ports:
      - "4000:4000"
    environment:
      - PORT=4000
      - NODE_ENV=development
      - DATABASE_URL=postgresql://postgres:postgres_password_chronos_2026@db:5432/chronospay_db
      - JWT_SECRET=dev_secret_key_chronospay
      - JWT_EXPIRES_IN=7d
      - STELLAR_NETWORK=testnet
      - HORIZON_URL=https://horizon-testnet.stellar.org
      - ENCRYPTION_KEY=your_32_character_encryption_key_
      - BALANCE_CACHE_TTL_SECONDS=30
      - ADMIN_PUBLIC_KEY=GBADMIN12345678901234567890123456789012345678901234567890
      - ADMIN_SECRET_KEY=SDSERVERSECRETKEYEXAMPLE123456789012345678901234567890
    depends_on:
      - db
    networks:
      - chronospay-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: chronospay-frontend
    restart: always
    ports:
      - "3000:3000"
    environment:
      - VITE_BACKEND_URL=http://backend:4000
    depends_on:
      - backend
    networks:
      - chronospay-network

volumes:
  chronospay-db-data:
    name: chronospay-db-data

networks:
  chronospay-network:
    name: chronospay-network
    driver: bridge
